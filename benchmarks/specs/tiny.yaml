# A fast benchmark spec for two small models. Compares prefill vs decode and shows
# aggregate throughput rising with concurrency.
#   uv run mlxd bench benchmarks/specs/tiny.yaml

prompt: "Write three sentences about Apple Silicon unified memory."
max_tokens: 64
concurrency: [1, 2, 4]
models:
  - mlx-community/Qwen2.5-0.5B-Instruct-4bit
  - mlx-community/Llama-3.2-1B-Instruct-4bit
